<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinhan Live STT</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --ink: #171923;
      --muted: #667085;
      --line: #d9dee7;
      --panel: #ffffff;
      --green: #0f766e;
      --red: #c2410c;
      --yellow: #facc15;
      --black: #101828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 18px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--green);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      flex: 0 0 auto;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .sub {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .badge {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.82fr);
      gap: 18px;
      align-items: start;
    }
    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .pad { padding: 16px; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 160px 96px;
      gap: 10px;
      align-items: end;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
    }
    button {
      height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0;
    }
    .primary { background: var(--green); color: #fff; }
    .secondary { background: #eef1f6; color: var(--black); }
    .danger { background: #fff1eb; color: var(--red); }
    .status {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--muted);
      line-height: 1.5;
      min-height: 46px;
      background: #fbfcfe;
    }
    .status.error { border-color: #fdba74; color: var(--red); background: #fff7ed; }
    .status.success { border-color: #99f6e4; color: var(--green); background: #f0fdfa; }
    .video {
      position: relative;
      margin-top: 18px;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111827;
    }
    .video iframe,
    .placeholder {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .placeholder {
      display: grid;
      place-items: center;
      padding: 20px;
      color: #d1d5db;
      text-align: center;
      line-height: 1.6;
    }
    .live-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .readout {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 112px;
      background: #fff;
    }
    .readout.partial {
      border-style: dashed;
      background: #fbfcfe;
    }
    .readout.translating {
      border-color: #fde68a;
      background: #fffbeb;
    }
    .label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .text {
      font-size: 18px;
      line-height: 1.65;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .feed {
      display: grid;
      gap: 10px;
      max-height: 600px;
      overflow: auto;
      padding-right: 4px;
    }
    .segment {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .segment-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .ko {
      font-size: 17px;
      line-height: 1.65;
      margin-bottom: 10px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .en {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .empty {
      color: var(--muted);
      line-height: 1.6;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    @media (max-width: 960px) {
      main { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .layout { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      h1 { font-size: 21px; }
      .text { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand">
        <div class="mark">STT</div>
        <div>
          <h1>실시간 영어 STT · 한글 번역</h1>
          <p class="sub">YouTube Live 오디오를 AssemblyAI로 받아 적고, OpenAI로 자연스럽게 번역합니다.</p>
        </div>
      </div>
      <div class="badge">AssemblyAI Streaming + OpenAI</div>
    </header>

    <div class="layout">
      <section>
        <div class="section pad">
          <div class="controls">
            <div>
              <label for="streamUrl">YouTube Live URL 또는 오디오 URL</label>
              <input id="streamUrl" type="url" placeholder="https://www.youtube.com/watch?v=...">
            </div>
            <button class="primary" id="startBtn">시작</button>
            <button class="danger" id="stopBtn">중지</button>
          </div>
          <div class="status" id="status">URL을 입력하고 시작을 누르세요.</div>
        </div>

        <div class="video" id="videoShell">
          <div class="placeholder">YouTube URL을 입력하면 영상 미리보기가 표시됩니다.</div>
        </div>

        <div class="section pad" style="margin-top:18px">
          <div class="label">확정 기록</div>
          <div class="feed" id="feed">
            <div class="empty">아직 확정된 문장이 없습니다.</div>
          </div>
        </div>
      </section>

      <aside class="live-grid">
        <div class="section pad">
          <div class="readout partial">
            <div class="label">영어 초안</div>
            <div class="text" id="partialEnglish">말하는 동안 이곳에 임시 STT가 표시됩니다.</div>
          </div>
          <div class="readout" style="margin-top:12px">
            <div class="label">확정 영어</div>
            <div class="text" id="liveEnglish">문장이 끝나면 확정 영어가 표시됩니다.</div>
          </div>
          <div class="readout" id="koreanBox" style="margin-top:12px">
            <div class="label">확정 한글</div>
            <div class="text" id="liveKorean">번역 결과가 이곳에 표시됩니다.</div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const streamUrlInput = document.getElementById("streamUrl");
    const statusEl = document.getElementById("status");
    const liveEnglish = document.getElementById("liveEnglish");
    const partialEnglish = document.getElementById("partialEnglish");
    const liveKorean = document.getElementById("liveKorean");
    const koreanBox = document.getElementById("koreanBox");
    const feed = document.getElementById("feed");
    const videoShell = document.getElementById("videoShell");
    const segments = new Map();
    let ws = null;

    function wsUrl() {
      const scheme = location.protocol === "https:" ? "wss" : "ws";
      return `${scheme}://${location.host}/ws/ui`;
    }

    function esc(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function setStatus(text, level = "info") {
      statusEl.textContent = text;
      statusEl.className = `status ${level === "error" ? "error" : level === "success" ? "success" : ""}`;
    }

    function parseYoutubeId(url) {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtu.be")) return parsed.pathname.slice(1);
        if (parsed.hostname.includes("youtube.com")) return parsed.searchParams.get("v") || "";
      } catch {
        return "";
      }
      return "";
    }

    function setPreview(url) {
      const id = parseYoutubeId(url);
      if (!id) {
        videoShell.innerHTML = '<div class="placeholder">YouTube가 아닌 URL은 영상 없이 오디오만 처리합니다.</div>';
        return;
      }
      videoShell.innerHTML = `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(id)}?autoplay=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    }

    function resetUi() {
      segments.clear();
      partialEnglish.textContent = "말하는 동안 이곳에 임시 STT가 표시됩니다.";
      liveEnglish.textContent = "문장이 끝나면 확정 영어가 표시됩니다.";
      liveKorean.textContent = "번역 결과가 이곳에 표시됩니다.";
      koreanBox.classList.remove("translating");
      feed.innerHTML = '<div class="empty">아직 확정된 문장이 없습니다.</div>';
    }

    function renderFeed() {
      const items = [...segments.values()].sort((a, b) => b.seq - a.seq);
      if (!items.length) {
        feed.innerHTML = '<div class="empty">아직 확정된 문장이 없습니다.</div>';
        return;
      }
      feed.innerHTML = items.map(item => `
        <article class="segment">
          <div class="segment-head">
            <span>${esc(item.id)}</span>
            <span>${item.transMs ? `${item.transMs}ms` : "번역 중"}</span>
          </div>
          <div class="ko">${esc(item.ko || "번역 중입니다...")}</div>
          <div class="en">${esc(item.en || "영어 문장 대기 중입니다...")}</div>
        </article>
      `).join("");
    }

    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return ws;
      ws = new WebSocket(wsUrl());
      ws.onopen = () => setStatus("서버와 연결되었습니다. STT 세션을 시작합니다.");
      ws.onmessage = event => {
        const payload = JSON.parse(event.data);
        if (payload.type === "reset") {
          resetUi();
        } else if (payload.type === "status") {
          setStatus(payload.message, payload.level);
        } else if (payload.type === "error") {
          setStatus(payload.message, "error");
        } else if (payload.type === "partial") {
          partialEnglish.textContent = payload.text || "말하는 동안 이곳에 임시 STT가 표시됩니다.";
        } else if (payload.type === "translation_start") {
          koreanBox.classList.add("translating");
          liveKorean.textContent = "";
          const item = segments.get(payload.segment_id) || { id: payload.segment_id, seq: payload.seq, en: "", ko: "", transMs: 0 };
          segments.set(payload.segment_id, item);
          renderFeed();
        } else if (payload.type === "translation_delta") {
          const item = segments.get(payload.segment_id) || { id: payload.segment_id, seq: payload.seq, en: "", ko: "", transMs: 0 };
          item.ko = `${item.ko || ""}${payload.text || ""}`;
          liveKorean.textContent = item.ko;
          segments.set(payload.segment_id, item);
          renderFeed();
        } else if (payload.type === "segment") {
          const item = segments.get(payload.segment_id) || { id: payload.segment_id, seq: payload.seq, en: "", ko: "", transMs: 0 };
          if (payload.phase === "final_en") {
            item.en = payload.text || "";
            liveEnglish.textContent = item.en;
            partialEnglish.textContent = "다음 문장을 듣고 있습니다.";
          }
          if (payload.phase === "final_ko") {
            item.ko = payload.text || "";
            item.transMs = payload.trans_ms || 0;
            liveKorean.textContent = item.ko;
            koreanBox.classList.remove("translating");
            setStatus("번역 결과를 갱신했습니다.", "success");
          }
          segments.set(payload.segment_id, item);
          renderFeed();
        }
      };
      ws.onclose = () => setStatus("서버 연결이 종료되었습니다.");
      ws.onerror = () => setStatus("WebSocket 연결 오류가 발생했습니다.", "error");
      return ws;
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      const url = streamUrlInput.value.trim();
      if (!url) {
        setStatus("먼저 YouTube Live URL 또는 오디오 URL을 입력하세요.", "error");
        return;
      }
      setPreview(url);
      const socket = connect();
      const start = () => socket.send(JSON.stringify({ type: "start", url }));
      if (socket.readyState === WebSocket.OPEN) start();
      else socket.addEventListener("open", start, { once: true });
    });

    document.getElementById("stopBtn").addEventListener("click", () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "stop" }));
      }
    });
  </script>
</body>
</html>
