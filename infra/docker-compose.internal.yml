services:
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    image: shinhan/live-stt-gateway:latest
    ports:
      - "8080:8080"
    env_file:
      - ./gateway.env.example
    environment:
      PORT: 8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
