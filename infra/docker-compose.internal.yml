services:
  nemotron-asr:
    build:
      context: ..
      dockerfile: services/nemotron_asr/Dockerfile
    image: shinhan/nemotron-asr:latest
    ports:
      - "8090:8090"
    environment:
      NEMOTRON_MODEL_PATH: /models/nvidia/nemotron-speech-streaming-en-0.6b/nemotron-speech-streaming-en-0.6b.nemo
      NEMOTRON_DEVICE: cuda
    env_file:
      - ./nemotron.env.example
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - ../artifacts/models:/models:ro
    gpus: all
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: apps/gateway/Dockerfile
    image: shinhan/gateway:latest
    ports:
      - "8080:8080"
    environment:
      STT_WS_URL: ws://nemotron-asr:8090/ws/transcribe
      TRANSLATION_BACKEND: vllm
      VLLM_BASE_URL: http://host.docker.internal:8000
      VLLM_MODEL_NAME: gpt-4o
    env_file:
      - ./gateway.env.example
    depends_on:
      nemotron-asr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
